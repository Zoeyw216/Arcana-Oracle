<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arcana Oracle - 塔罗占卜</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&family=Cinzel+Decorative:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/cards.css">
<link rel="stylesheet" href="css/animations.css">
</head>
<body>

<!-- Stars background -->
<div class="stars" id="stars"></div>

<!-- Hand cursor (for gesture tracking) -->
<div class="hand-cursor" id="handCursor">
  <div class="hand-cursor-inner"></div>
</div>

<!-- Main container -->
<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="oracle-icon">
      <svg width="68" height="68" viewBox="0 0 68 68">
        <defs>
          <linearGradient id="moonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#c4b49a"/>
            <stop offset="100%" style="stop-color:#9b8b74"/>
          </linearGradient>
        </defs>
        <!-- Crescent moon -->
        <circle cx="30" cy="34" r="18" fill="none" stroke="url(#moonGrad)" stroke-width="1.5" opacity="0.9"/>
        <circle cx="37" cy="30" r="15" fill="#f7f4ef" stroke="none"/>
        <!-- Star nestled in crescent -->
        <polygon points="42,30 43.8,35 49,35.5 45,38.8 46.2,44 42,41 37.8,44 39,38.8 35,35.5 40.2,35" fill="url(#moonGrad)" opacity="0.85"/>
        <!-- Tiny scattered stars -->
        <circle cx="20" cy="16" r="1" fill="#b3a08a" opacity="0.7"/>
        <circle cx="54" cy="22" r="0.8" fill="#b3a08a" opacity="0.6"/>
        <circle cx="14" cy="44" r="0.8" fill="#b3a08a" opacity="0.55"/>
        <circle cx="50" cy="48" r="1" fill="#b3a08a" opacity="0.6"/>
        <circle cx="34" cy="12" r="0.7" fill="#b3a08a" opacity="0.55"/>
        <circle cx="58" cy="36" r="0.7" fill="#b3a08a" opacity="0.5"/>
      </svg>
    </div>
    <h1>Arcana Oracle</h1>
    <div class="subtitle">塔 罗 占 卜</div>
  </div>

  <!-- Question -->
  <div class="question-section" id="questionSection">
    <label class="question-label">在心中默念你的问题</label>
    <input type="text" class="question-input" id="questionInput"
           placeholder="输入你想问的事情..." maxlength="100" autocomplete="off">
  </div>

  <!-- Draw button -->
  <button class="draw-btn" id="drawBtn">开 始 抽 牌</button>

  <!-- Deck area (3D floating cards) -->
  <div class="deck-area" id="deckArea"></div>
  <div class="deck-hint" id="deckHint"></div>

  <!-- Results -->
  <div class="results" id="results">
    <div class="results-title" id="resultsTitle"></div>
    <div class="cards-row" id="cardsRow"></div>
    <div class="interpretation" id="interpretation"></div>
    <div class="results-actions">
      <button class="action-btn" id="generateImageBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
        生成照片
      </button>
      <button class="action-btn" id="resetBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <polyline points="1 4 1 10 7 10"/>
          <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
        </svg>
        重新占卜
      </button>
    </div>
  </div>
</div>

<!-- Card zoom modal -->
<div class="card-zoom-overlay" id="cardZoomOverlay">
  <div class="card-zoom-content" id="cardZoomContent"></div>
  <div class="card-zoom-name" id="cardZoomName"></div>
</div>

<!-- Image preview modal -->
<div class="image-preview-overlay" id="imagePreviewOverlay">
  <div class="image-preview-container">
    <div class="image-preview-close" id="imagePreviewClose">&times;</div>
    <img class="image-preview-img" id="imagePreviewImg" alt="塔罗占卜结果">
    <div class="image-preview-actions">
      <button class="action-btn" id="downloadImageBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        保存到相册
      </button>
      <button class="action-btn" id="shareImageBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="18" cy="5" r="3"/>
          <circle cx="6" cy="12" r="3"/>
          <circle cx="18" cy="19" r="3"/>
          <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
          <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
        </svg>
        分享
      </button>
    </div>
  </div>
</div>

<!-- Interaction mode modal -->
<div class="mode-modal" id="modeModal">
  <div class="mode-modal-content">
    <h3>选择交互方式</h3>
    <p>开启摄像头，用手势抓取塔罗牌，体验更沉浸的占卜</p>
    <div class="mode-buttons">
      <button class="mode-btn primary" id="enableCamera">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
        启用手势追踪
      </button>
      <button class="mode-btn" id="useClick">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 2L12 8M12 8L8 5M12 8L16 5"/>
          <rect x="8" y="10" width="8" height="10" rx="1"/>
        </svg>
        使用点击操控
      </button>
    </div>
  </div>
</div>

<!-- Camera preview (small PiP) -->
<div class="camera-pip" id="cameraPip">
  <video id="cameraPreview" autoplay playsinline muted></video>
</div>

<!-- Hand tracking loading indicator -->
<div class="hand-loading" id="handLoadingIndicator">
  <div class="hand-loading-spinner"></div>
  <span>加载手势识别模型...</span>
</div>

<footer style="position:fixed;bottom:12px;right:18px;font-family:'Cormorant Garamond',serif;font-size:0.78em;color:#5a6f82;letter-spacing:2px;opacity:1;z-index:10;">Made by Zoey Wang</footer>

<script type="module" src="js/app.js"></script>
</body>
</html>
