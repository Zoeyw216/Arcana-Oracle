<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d2640"/>
      <stop offset="100%" stop-color="#1e1a2e"/>
    </linearGradient>
    <linearGradient id="moon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4c4a0"/>
      <stop offset="100%" stop-color="#b09a72"/>
    </linearGradient>
  </defs>
  <!-- Dark rounded background -->
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>
  <!-- Crescent moon -->
  <circle cx="13.5" cy="16.5" r="9" fill="none" stroke="url(#moon)" stroke-width="1.8"/>
  <circle cx="17.5" cy="14.5" r="7.5" fill="url(#bg)"/>
  <!-- Star -->
  <polygon points="21,15.5 22.2,18.5 25.3,18.8 23,21 23.6,24.2 21,22.4 18.4,24.2 19,21 16.7,18.8 19.8,18.5" fill="url(#moon)"/>
  <!-- Tiny accent stars -->
  <circle cx="8" cy="8" r="0.9" fill="#d4c4a0" opacity="0.7"/>
  <circle cx="26" cy="9" r="0.7" fill="#d4c4a0" opacity="0.6"/>
  <circle cx="6.5" cy="24" r="0.7" fill="#d4c4a0" opacity="0.5"/>
</svg>
